<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Accounting</title>
</head>
<body>
    <h1>HR Accounting</h1>
    
    <button id="addEmployeeBtn">Add Employee</button>
        <div class="filters">
        <input type="text" id="searchInput" placeholder="Search by full name...">
        
        <select id="filterDepartment">
            <option value="">All Departments</option>
        </select>
        
        <select id="filterPosition">
            <option value="">All Positions</option>
        </select>
        
        <button id="applyFilters">Apply Filters</button>
        <button id="clearFilters">Clear</button>
    </div>
    
    <div id="employeeForm" style="display: none;">
        <h2>Add New Employee</h2>
        <form id="employeeFormData">
            <input type="text" name="full_name" placeholder="Full Name" required>
            <input type="date" name="birth_date" required>
            <input type="text" name="passport_series" placeholder="Passport Series" maxlength="4" required>
            <input type="text" name="passport_number" placeholder="Passport Number" maxlength="6" required>
            <input type="text" name="phone" placeholder="Phone" required>
            <input type="email" name="email" placeholder="Email">
            <textarea name="address" placeholder="Address" required></textarea>
            <select name="department_id" id="departmentSelect" required></select>
            <select name="position_id" id="positionSelect" required></select>
            <input type="number" name="salary" placeholder="Salary" step="0.01" required>
            <input type="date" name="hire_date" required>
            <button type="submit">Save</button>
            <button type="button" id="cancelForm">Cancel</button>
        </form>
    </div>
    <div id="employeeTable"></div>
</body>
</html>
