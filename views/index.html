<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Accounting</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>HR Accounting</h1>
        
        <button id="addEmployeeBtn">Add Employee</button>
        
        <div class="filters">
            <input type="text" id="searchInput" placeholder="Search by full name...">
            
            <select id="filterDepartment">
                <option value="">All Departments</option>
            </select>
            
            <select id="filterPosition">
                <option value="">All Positions</option>
            </select>
            
            <button id="applyFilters">Apply Filters</button>
            <button id="clearFilters">Clear</button>
        </div>
        
        <div id="employeeForm" style="display: none;">
            <h2 id="formTitle">Add New Employee</h2>
            <form id="employeeFormData">
                <div class="form-group">
                    <label>Full Name:</label>
                    <input type="text" name="full_name" required>
                </div>
                
                <div class="form-group">
                    <label>Birth Date:</label>
                    <input type="date" name="birth_date" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Passport Series:</label>
                        <input type="text" name="passport_series" maxlength="4" placeholder="1234" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Passport Number:</label>
                        <input type="text" name="passport_number" maxlength="6" placeholder="123456" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Phone:</label>
                    <input type="text" name="phone" placeholder="+7 (999) 999-99-99" required>
                </div>
                
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" name="email">
                </div>
                
                <div class="form-group">
                    <label>Address:</label>
                    <textarea name="address" required></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Department:</label>
                        <select name="department_id" id="departmentSelect" required></select>
                    </div>
                    
                    <div class="form-group">
                        <label>Position:</label>
                        <select name="position_id" id="positionSelect" required></select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Salary:</label>
                        <input type="number" name="salary" step="0.01" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Hire Date:</label>
                        <input type="date" name="hire_date" required>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit">Save</button>
                    <button type="button" id="cancelForm">Cancel</button>
                </div>
            </form>
        </div>
        
        <div id="employeeTable"></div>
    </div>

    <script src="https://unpkg.com/imask"></script>
    <script src="/js/script.js"></script>
</body>
</html>
